<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
  </head>
  <body>
    <h2>Login</h2>
    {% for message in messages %}
    <p>{{message}}</p>
    {% endfor %}

    <form method="post">
      {% csrf_token %}
      <input
        type="text"
        name="username"
        placeholder="username"
        required
      /><br />
      <input
        type="password"
        name="password"
        placeholder="password"
        required
      /><br />
      <button type="submit">Login</button>
      <a href="/register">Register</a>
    </form>
  </body>
</html>
